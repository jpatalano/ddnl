<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCC API Debugger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #003366; --teal: #00BFA5; --bg: #eaf0f6;
      --surface: #fff; --surface2: #f4f7fa; --border: #d3dce8;
      --text: #1a2633; --muted: #5f7a96; --green: #22c55e;
      --red: #ef4444; --amber: #f59e0b;
      --radius: 8px; --shadow: 0 2px 12px rgba(0,51,102,.10);
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    /* Top bar */
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--navy); height: 48px;
      display: flex; align-items: center; padding: 0 20px; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .brand { font-size: 14px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
    .brand span { color: var(--teal); }
    .badge { background: var(--teal); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .topbar-link { margin-left: auto; color: rgba(255,255,255,.6); font-size: 12px; text-decoration: none; }
    .topbar-link:hover { color: var(--teal); }

    /* Layout */
    #app { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 48px); }

    /* Sidebar */
    #sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sidebar-section { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; padding: 8px 8px 4px; }
    .ds-btn {
      width: 100%; text-align: left; padding: 8px 10px; border: none; background: transparent;
      border-radius: 6px; cursor: pointer; font-size: 12.5px; color: var(--text);
      display: flex; flex-direction: column; gap: 2px; transition: background .1s;
    }
    .ds-btn:hover { background: var(--bg); }
    .ds-btn.active { background: #e8f0fb; color: var(--navy); font-weight: 600; }
    .ds-btn .ds-name { font-size: 12px; }
    .ds-btn .ds-meta { font-size: 10px; color: var(--muted); }
    .ds-btn.active .ds-meta { color: #5a7fc0; }

    /* Main panel */
    #main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* Cards */
    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .card-title { font-size: 13px; font-weight: 700; color: var(--navy); }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .card-body { padding: 14px 16px; }

    /* Schema tables */
    .schema-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .schema-table th {
      background: var(--navy); color: #fff; padding: 7px 10px;
      text-align: left; font-size: 11px; font-weight: 600;
    }
    .schema-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .schema-table tr:last-child td { border-bottom: none; }
    .schema-table tr:hover td { background: var(--bg); }
    .tag {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 600;
    }
    .tag-string  { background: #e8f0fb; color: #2563eb; }
    .tag-date    { background: #f0fdf4; color: #15803d; }
    .tag-number  { background: #fff7ed; color: #c2410c; }
    .tag-currency{ background: #f0fdf4; color: #15803d; }
    .tag-pct     { background: #fdf4ff; color: #7e22ce; }
    .tag-missing { background: #fef2f2; color: var(--red); }
    .tag-ok      { background: #f0fdf4; color: var(--green); }
    .tag-warn    { background: #fffbeb; color: var(--amber); }

    /* Query builder */
    .qb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .qb-grid.full { grid-template-columns: 1fr; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; }
    select, input[type=text], textarea {
      width: 100%; padding: 7px 10px; border: 1.5px solid var(--border);
      border-radius: 6px; font-size: 12.5px; font-family: inherit;
      background: var(--surface2); color: var(--text); outline: none;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--teal); }
    textarea { font-family: 'Consolas', monospace; font-size: 12px; resize: vertical; }
    .btn {
      padding: 7px 16px; border: none; border-radius: 6px; font-size: 12.5px;
      font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover { background: #009e88; }
    .btn-secondary { background: var(--surface2); color: var(--navy); border: 1.5px solid var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .btn-danger { background: #fef2f2; color: var(--red); border: 1.5px solid #fecaca; }
    .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* Checkboxes for multi-select */
    .check-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 4px; max-height: 150px; overflow-y: auto;
      border: 1.5px solid var(--border); border-radius: 6px; padding: 8px;
      background: var(--surface2);
    }
    .check-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .check-item input { accent-color: var(--teal); width: 13px; height: 13px; }

    /* Response area */
    #response-area {
      font-family: 'Consolas', monospace; font-size: 12px;
      background: #0d1117; color: #e6edf3; border-radius: var(--radius);
      padding: 14px; overflow: auto; max-height: 500px; white-space: pre;
      line-height: 1.5;
    }
    .resp-key   { color: #79c0ff; }
    .resp-str   { color: #a5d6ff; }
    .resp-num   { color: #f2cc60; }
    .resp-bool  { color: #ff7b72; }
    .resp-null  { color: #8b949e; }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 16px; padding: 10px 16px;
      border-top: 1px solid var(--border); background: var(--surface2);
      border-radius: 0 0 var(--radius) var(--radius);
      font-size: 11px; flex-wrap: wrap;
    }
    .stat { display: flex; gap: 4px; }
    .stat-label { color: var(--muted); }
    .stat-value { font-weight: 700; color: var(--navy); }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red); }
    .stat-value.amber { color: var(--amber); }

    /* Segment values inspector */
    .sv-row { display: flex; gap: 8px; align-items: flex-end; }
    .sv-row > div { flex: 1; }
    .sv-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      padding: 3px 10px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; font-size: 11.5px; cursor: default;
    }
    .chip:hover { background: #e8f0fb; border-color: var(--teal); }

    /* Issues panel */
    .issue { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .issue:last-child { border-bottom: none; }
    .issue-icon { font-size: 14px; margin-top: 1px; flex-shrink: 0; }
    .issue-body { flex: 1; }
    .issue-title { font-weight: 600; font-size: 12.5px; }
    .issue-desc { color: var(--muted); font-size: 11.5px; margin-top: 2px; }

    /* Spinner */
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { color: var(--muted); text-align: center; padding: 24px; font-size: 12.5px; }

    /* Diff highlight */
    .diff-warn { background: #fffbeb; }
    .diff-err  { background: #fef2f2; }
  </style>
</head>
<body>

<div id="topbar">
  <div class="brand">FCC <span>Analytics</span> &nbsp;API Debugger</div>
  <div class="badge">DEV</div>
  <a class="topbar-link" href="/">← Back to Dashboard</a>
</div>

<div id="app">
  <!-- Sidebar: dataset list -->
  <div id="sidebar">
    <div class="sidebar-section">Datasets</div>
    <div id="ds-list"><div class="empty"><span class="spinner"></span></div></div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Schema card -->
    <div class="card" id="schema-card" style="display:none">
      <div class="card-header">
        <div>
          <div class="card-title" id="schema-title">—</div>
          <div class="card-sub" id="schema-sub">—</div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="runReindex()">↺ Reindex</button>
          <span id="reindex-status" style="font-size:11px;color:var(--muted)"></span>
        </div>
      </div>
      <div class="card-body">
        <!-- Issues -->
        <div id="issues-wrap" style="margin-bottom:14px;display:none">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Issues Detected</div>
          <div id="issues-list"></div>
        </div>
        <!-- Tabs -->
        <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:12px">
          <button class="schema-tab active" onclick="showSchemaTab('segments')" id="stab-segments">Segments</button>
          <button class="schema-tab" onclick="showSchemaTab('metrics')" id="stab-metrics">Metrics</button>
          <button class="schema-tab" onclick="showSchemaTab('sql')" id="stab-sql">Base SQL</button>
        </div>
        <div id="schema-segments"></div>
        <div id="schema-metrics" style="display:none"></div>
        <div id="schema-sql" style="display:none"></div>
      </div>
    </div>

    <!-- Segment values inspector -->
    <div class="card" id="sv-card" style="display:none">
      <div class="card-header"><div class="card-title">Segment Values Inspector</div></div>
      <div class="card-body">
        <div class="sv-row">
          <div>
            <div class="field-label">Segment</div>
            <select id="sv-segment" onchange="loadSegmentValues()"><option value="">— pick a segment —</option></select>
          </div>
          <div style="max-width:80px">
            <div class="field-label">Limit</div>
            <input type="text" id="sv-limit" value="50" style="width:80px">
          </div>
          <div style="padding-bottom:1px">
            <button class="btn btn-primary" onclick="loadSegmentValues()">Fetch</button>
          </div>
        </div>
        <div id="sv-result" style="margin-top:12px"></div>
      </div>
    </div>

    <!-- Query builder -->
    <div class="card" id="qb-card" style="display:none">
      <div class="card-header"><div class="card-title">Query Builder</div><div class="card-sub">POST /api/bi/query</div></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:12px">

        <div class="qb-grid">
          <div>
            <div class="field-label">Group By Segments</div>
            <div class="check-grid" id="qb-groupby"></div>
          </div>
          <div>
            <div class="field-label">Metrics</div>
            <div class="check-grid" id="qb-metrics"></div>
          </div>
        </div>

        <div class="qb-grid">
          <div>
            <div class="field-label">Filters (JSON array)</div>
            <textarea id="qb-filters" rows="3" placeholder='[{"segmentName":"Yard","operator":"eq","value":"Detroit"}]'></textarea>
          </div>
          <div>
            <div class="field-label">Order By / Limit</div>
            <div style="display:flex;gap:8px;margin-bottom:8px">
              <select id="qb-orderfield" style="flex:2"><option value="">No order</option></select>
              <select id="qb-orderdir" style="flex:1"><option value="DESC">DESC</option><option value="ASC">ASC</option></select>
            </div>
            <input type="text" id="qb-limit" value="25" placeholder="Limit">
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="runQuery()">▶ Run Query</button>
          <button class="btn btn-secondary" onclick="runKpiQuery()">▶ Run as KPI</button>
          <button class="btn btn-secondary" onclick="copyPayload()">Copy Payload</button>
          <button class="btn btn-danger" onclick="clearResponse()">Clear</button>
          <span id="qb-status" style="font-size:11px;color:var(--muted)"></span>
        </div>

        <!-- Response -->
        <div id="response-wrap" style="display:none">
          <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Response</div>
          <div id="response-area"></div>
          <div class="stats-bar" id="stats-bar"></div>
        </div>

      </div>
    </div>

    <!-- Placeholder -->
    <div id="placeholder" style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px">
      ← Select a dataset to begin
    </div>

  </div>
</div>

<style>
  .schema-tab {
    padding: 6px 14px; border: none; background: transparent; cursor: pointer;
    font-size: 12.5px; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; font-weight: 500; transition: color .1s;
  }
  .schema-tab.active { color: var(--navy); border-bottom-color: var(--teal); font-weight: 700; }
  .schema-tab:hover { color: var(--navy); }
</style>

<script>
const BASE = 'https://saasanalytic.fleetcostcare.com/api';
let datasets = [];
let currentDs = null;

/* ── Boot ─────────────────────────────────────────────────────── */
async function init() {
  const r = await fetch(`${BASE}/bi/datasets`);
  const j = await r.json();
  datasets = j.data.datasets;
  renderDatasetList();
}

function renderDatasetList() {
  const el = document.getElementById('ds-list');
  el.innerHTML = datasets.map(ds => `
    <button class="ds-btn" onclick="selectDataset('${ds.name}')" id="dsb-${ds.name}">
      <div class="ds-name">${ds.name}</div>
      <div class="ds-meta">${ds.segmentCount} segs · ${ds.metricCount} metrics · ${ds.isActive ? '● active' : '○ inactive'}</div>
    </button>`).join('');
}

/* ── Select dataset ───────────────────────────────────────────── */
async function selectDataset(name) {
  document.querySelectorAll('.ds-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`dsb-${name}`)?.classList.add('active');
  document.getElementById('placeholder').style.display = 'none';

  const r = await fetch(`${BASE}/bi/datasets/${name}`);
  const j = await r.json();
  currentDs = j.data;

  renderSchema();
  renderQueryBuilder();
  populateSegmentValuesDropdown();

  ['schema-card','sv-card','qb-card'].forEach(id => document.getElementById(id).style.display = '');
  clearResponse();
}

/* ── Schema ───────────────────────────────────────────────────── */
function renderSchema() {
  const ds = currentDs.dataset;
  const segs = currentDs.segments;
  const metrics = currentDs.metrics;

  document.getElementById('schema-title').textContent = ds.name;
  document.getElementById('schema-sub').textContent =
    `${ds.description} · ${segs.length} segments · ${metrics.length} metrics · Source: ${ds.sourceConnectionName}`;

  // Issues detection
  const issues = detectIssues(ds, segs, metrics);
  const iWrap = document.getElementById('issues-wrap');
  const iList = document.getElementById('issues-list');
  if (issues.length) {
    iWrap.style.display = '';
    iList.innerHTML = issues.map(i => `
      <div class="issue">
        <div class="issue-icon">${i.level === 'error' ? '🔴' : '🟡'}</div>
        <div class="issue-body">
          <div class="issue-title">${i.title}</div>
          <div class="issue-desc">${i.desc}</div>
        </div>
      </div>`).join('');
  } else {
    iWrap.style.display = 'none';
  }

  // Segments table
  const KNOWN_NONSTANDARD = {
    'SalesPersonName': 'Should be SalesPerson',
    'YardCode': 'Prefer Yard (display name)',
    'YardName': 'Prefer Yard',
    'CustCode': 'Should be Customer',
    'CustName': 'Should be Customer',
    'CompanyCode': 'Should be Company',
    'CompanyName': 'Should be Company',
    'SpersonCode': 'Should be SalesPerson',
  };

  document.getElementById('schema-segments').innerHTML = `
    <table class="schema-table">
      <thead><tr>
        <th>columnName</th><th>segmentName</th><th>Type</th>
        <th>displayAlias</th><th>Filterable</th><th>Groupable</th><th>Notes</th>
      </tr></thead>
      <tbody>
        ${segs.map(s => {
          const seg = s.segment;
          const warn = KNOWN_NONSTANDARD[s.columnName] || KNOWN_NONSTANDARD[seg.segmentName];
          return `<tr class="${warn ? 'diff-warn' : ''}">
            <td><code>${s.columnName}</code></td>
            <td><code>${seg.segmentName}</code></td>
            <td><span class="tag tag-${seg.segmentType}">${seg.segmentType}</span></td>
            <td>${s.displayAlias ? `<span class="tag tag-ok">${s.displayAlias}</span>` : '<span class="tag tag-missing">null</span>'}</td>
            <td>${seg.isFilterable ? '✓' : '—'}</td>
            <td>${seg.isGroupable ? '✓' : '—'}</td>
            <td style="color:var(--amber);font-size:11px">${warn||''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  // Metrics table
  document.getElementById('schema-metrics').innerHTML = `
    <table class="schema-table">
      <thead><tr>
        <th>metricName</th><th>columnName</th><th>Aggregation</th><th>Format</th><th>Prefix</th><th>Suffix</th>
      </tr></thead>
      <tbody>
        ${metrics.map(m => `<tr>
          <td><code>${m.metricName}</code></td>
          <td><code>${m.columnName}</code></td>
          <td><span class="tag tag-string">${m.aggregationType}</span></td>
          <td><span class="tag tag-${m.displayFormat==='currency'?'currency':m.displayFormat==='percentage'||m.displayFormat==='percent'?'pct':'number'}">${m.displayFormat}</span></td>
          <td>${m.prefix||'—'}</td>
          <td>${m.suffix||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

  // SQL
  document.getElementById('schema-sql').innerHTML = `
    <div style="font-family:Consolas,monospace;font-size:12px;background:#0d1117;color:#e6edf3;
      padding:14px;border-radius:6px;overflow:auto;white-space:pre-wrap;line-height:1.6">
      ${escHtml(ds.baseSQL)}
    </div>`;
}

function detectIssues(ds, segs, metrics) {
  const issues = [];
  // displayAlias all null
  if (segs.every(s => !s.displayAlias)) {
    issues.push({ level:'warn', title:'No displayAlias set', desc:'All segment displayAlias values are null. Segment names are shown as raw technical names.' });
  }
  // Duplicate column mapped to multiple segments
  const colMap = {};
  segs.forEach(s => { (colMap[s.columnName] = colMap[s.columnName]||[]).push(s.segment.segmentName); });
  Object.entries(colMap).forEach(([col, names]) => {
    if (names.length > 1) issues.push({ level:'error', title:`Duplicate column mapping: ${col}`, desc:`Column "${col}" is mapped to ${names.length} segments: ${names.join(', ')}` });
  });
  // Non-standard segment names
  const nonStd = ['SalesPersonName','YardCode','YardName','CustCode','CustName','CompanyCode','CompanyName','SpersonCode'];
  segs.forEach(s => {
    if (nonStd.includes(s.segment.segmentName) || nonStd.includes(s.columnName)) {
      issues.push({ level:'warn', title:`Non-standard segment: ${s.segment.segmentName}`, desc:`Column "${s.columnName}" → segmentName "${s.segment.segmentName}" doesn't match the proposed standard naming convention.` });
    }
  });
  // DueStatus integer
  if (segs.some(s => s.segment.segmentName === 'DueStatus')) {
    issues.push({ level:'warn', title:'DueStatus is numeric (0/1)', desc:'Should return string values "Coming Due" / "Past Due" for usability. Frontend currently translates manually.' });
  }
  return issues;
}

/* ── Schema tabs ──────────────────────────────────────────────── */
function showSchemaTab(tab) {
  ['segments','metrics','sql'].forEach(t => {
    document.getElementById(`schema-${t}`).style.display = t === tab ? '' : 'none';
    document.getElementById(`stab-${t}`).classList.toggle('active', t === tab);
  });
}

/* ── Segment values ───────────────────────────────────────────── */
function populateSegmentValuesDropdown() {
  const sel = document.getElementById('sv-segment');
  sel.innerHTML = '<option value="">— pick a segment —</option>' +
    currentDs.segments.map(s => `<option value="${s.segment.segmentName}">${s.segment.segmentName} (${s.columnName})</option>`).join('');
}

async function loadSegmentValues() {
  const seg = document.getElementById('sv-segment').value;
  const limit = document.getElementById('sv-limit').value || 50;
  const el = document.getElementById('sv-result');
  if (!seg) return;
  el.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await fetch(`${BASE}/bi/segment-values?datasetName=${currentDs.dataset.name}&segmentName=${seg}&limit=${limit}`);
    const j = await r.json();
    const vals = j.data?.values || [];
    el.innerHTML = vals.length
      ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px">${vals.length} values returned</div>
         <div class="sv-chips">${vals.map(v => `<div class="chip">${v.value ?? '(null)'}</div>`).join('')}</div>`
      : '<div class="empty">No values returned</div>';
  } catch(e) {
    el.innerHTML = `<div style="color:var(--red);font-size:12px">Error: ${e.message}</div>`;
  }
}

/* ── Query builder ────────────────────────────────────────────── */
function renderQueryBuilder() {
  const segs = currentDs.segments;
  const metrics = currentDs.metrics;

  // Group by checkboxes
  document.getElementById('qb-groupby').innerHTML = segs.map(s =>
    `<label class="check-item">
      <input type="checkbox" name="gb" value="${s.segment.segmentName}">
      ${s.segment.segmentName}
    </label>`).join('');

  // Metrics checkboxes
  document.getElementById('qb-metrics').innerHTML = metrics.map(m =>
    `<label class="check-item">
      <input type="checkbox" name="mt" value="${m.metricName}" data-agg="${m.aggregationType}">
      ${m.metricName}
    </label>`).join('');

  // Order by dropdown
  const orderSel = document.getElementById('qb-orderfield');
  orderSel.innerHTML = '<option value="">No order</option>' +
    metrics.map(m => `<option value="${m.metricName}">${m.metricName}</option>`).join('');
}

function buildQueryPayload() {
  const groupBy = [...document.querySelectorAll('#qb-groupby input:checked')].map(el => el.value);
  const selectedMetrics = [...document.querySelectorAll('#qb-metrics input:checked')].map(el => ({
    metricName: el.value, aggregation: el.dataset.agg, alias: el.value
  }));
  let filters = [];
  try { filters = JSON.parse(document.getElementById('qb-filters').value || '[]'); } catch(e) {}
  const orderField = document.getElementById('qb-orderfield').value;
  const orderDir   = document.getElementById('qb-orderdir').value;
  const limit      = parseInt(document.getElementById('qb-limit').value) || 25;

  const payload = {
    datasetName: currentDs.dataset.name,
    groupBySegments: groupBy,
    metrics: selectedMetrics,
    filters,
    limit
  };
  if (orderField) payload.orderBy = [{ field: orderField, direction: orderDir }];
  return payload;
}

async function runQuery() {
  const payload = buildQueryPayload();
  await fireRequest(`${BASE}/bi/query`, payload, 'query');
}

async function runKpiQuery() {
  const selectedMetrics = [...document.querySelectorAll('#qb-metrics input:checked')].map(el => ({
    metricName: el.value, aggregation: el.dataset.agg, alias: el.value
  }));
  let filters = [];
  try { filters = JSON.parse(document.getElementById('qb-filters').value || '[]'); } catch(e) {}
  const payload = { datasetName: currentDs.dataset.name, metrics: selectedMetrics, filters };
  await fireRequest(`${BASE}/bi/kpis`, payload, 'kpis');
}

async function fireRequest(url, payload, type) {
  const status = document.getElementById('qb-status');
  status.innerHTML = '<span class="spinner"></span>';
  const t0 = Date.now();
  document.getElementById('response-wrap').style.display = '';

  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const j = await r.json();
    const elapsed = Date.now() - t0;

    // Render highlighted JSON
    document.getElementById('response-area').innerHTML = syntaxHighlight(j);

    // Stats
    const rows = type === 'query' ? (j.data?.data||[]) : (j.data?.kpis||[]);
    const success = j.success !== false;
    const statsBar = document.getElementById('stats-bar');
    statsBar.innerHTML = `
      <div class="stat"><span class="stat-label">Status:</span><span class="stat-value ${success?'green':'red'}">${success ? '✓ '+r.status : '✗ '+r.status}</span></div>
      <div class="stat"><span class="stat-label">Time:</span><span class="stat-value ${elapsed>2000?'red':elapsed>500?'amber':'green'}">${elapsed}ms</span></div>
      <div class="stat"><span class="stat-label">Rows:</span><span class="stat-value">${rows.length}</span></div>
      <div class="stat"><span class="stat-label">Endpoint:</span><span class="stat-value">${url.replace(BASE,'')}</span></div>
      ${j.error ? `<div class="stat"><span class="stat-label">Error:</span><span class="stat-value red">${j.error.message||j.error}</span></div>` : ''}
    `;
    status.textContent = `${elapsed}ms · ${rows.length} rows`;
  } catch(e) {
    document.getElementById('response-area').textContent = `Error: ${e.message}`;
    status.textContent = 'Request failed';
  }
}

function copyPayload() {
  const p = buildQueryPayload();
  navigator.clipboard.writeText(JSON.stringify(p, null, 2));
  const btn = event.target;
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy Payload', 1500);
}

function clearResponse() {
  document.getElementById('response-wrap').style.display = 'none';
  document.getElementById('qb-status').textContent = '';
}

/* ── Reindex ──────────────────────────────────────────────────── */
async function runReindex() {
  const el = document.getElementById('reindex-status');
  el.innerHTML = '<span class="spinner"></span> Reindexing...';
  try {
    const r = await fetch(`${BASE}/bi/elastic/reindex/${currentDs.dataset.name}`, { method:'POST' });
    const j = await r.json();
    if (j.success) {
      el.innerHTML = `<span style="color:var(--green)">✓ Indexed ${j.data.indexed.toLocaleString()} records</span>`;
    } else {
      el.innerHTML = `<span style="color:var(--red)">✗ ${j.error?.message||'Failed'}</span>`;
    }
  } catch(e) {
    el.innerHTML = `<span style="color:var(--red)">✗ ${e.message}</span>`;
  }
  setTimeout(() => el.textContent = '', 6000);
}

/* ── Helpers ──────────────────────────────────────────────────── */
function syntaxHighlight(json) {
  const str = JSON.stringify(json, null, 2);
  return escHtml(str).replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    match => {
      if (/^"/.test(match)) {
        if (/:$/.test(match)) return `<span class="resp-key">${match}</span>`;
        return `<span class="resp-str">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="resp-bool">${match}</span>`;
      if (/null/.test(match))       return `<span class="resp-null">${match}</span>`;
      return `<span class="resp-num">${match}</span>`;
    }
  );
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
